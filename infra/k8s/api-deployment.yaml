apiVersion: apps/v1
kind: Deployment
metadata:
  name: nigeria-trust-api
  labels:
    app: nigeria-trust-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nigeria-trust-api
  template:
    metadata:
      labels:
        app: nigeria-trust-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: nigeria-trust-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            - name: OPS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: nigeria-trust-secrets
                  key: ops-access-key
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nigeria-trust-api
spec:
  selector:
    app: nigeria-trust-api
  ports:
    - name: http
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nigeria-trust-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nigeria-trust-api
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
